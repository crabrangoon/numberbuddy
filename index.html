<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Phone Memory Trainer</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>📱 Phone Memory Trainer</h1>

        <p class="subtitle">
            Learn any Australian mobile number
        </p>

        <!-- ========================= -->
        <!-- SETUP -->
        <!-- ========================= -->

        <div id="setup">

            <input
                id="phoneInput"
                class="phoneInput"
                type="tel"
                placeholder="04XX XXX XXX"
            >

            <button
                class="primary"
                onclick="startGame()">

                Start Training

            </button>

        </div>


        <!-- ========================= -->
        <!-- GAME -->
        <!-- ========================= -->

        <div
            id="game"
            style="display:none;">

            <div class="level">

                Level 1 • Study

            </div>


            <div
                id="instruction"
                class="instruction">

                Memorise this number

            </div>


            <div
                id="targetNumber"
                class="targetNumber">

            </div>


            <div
                id="countdown"
                class="countdown">

                5

            </div>


            <div
                id="display"
                class="display">

                Tap the keypad

            </div>


            <div class="keypad">

                <button onclick="pressKey('1')">1</button>
                <button onclick="pressKey('2')">2</button>
                <button onclick="pressKey('3')">3</button>

                <button onclick="pressKey('4')">4</button>
                <button onclick="pressKey('5')">5</button>
                <button onclick="pressKey('6')">6</button>

                <button onclick="pressKey('7')">7</button>
                <button onclick="pressKey('8')">8</button>
                <button onclick="pressKey('9')">9</button>

                <button onclick="clearNumber()">⌫</button>
                <button onclick="pressKey('0')">0</button>
                <button onclick="submit()">✓</button>

            </div>


            <div class="footer">

                <div>

                    Score

                    <span id="score">
                        0
                    </span>

                </div>

            </div>

        </div>

    </div>

</div>


<script src="utils.js"></script>
<script src="game.js"></script>
<script src="challenges.js"></script>
<script src="app.js"></script>

</body>

</html>
